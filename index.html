// === UPGRADED SFX ENGINE (multi-oscillator, layered) ===
function _osc(type,freq,freqEnd,vol,dur,delay,filterF){
if(!audioCtx)return;const now=audioCtx.currentTime+(delay||0);
const o=audioCtx.createOscillator(),g=audioCtx.createGain();
o.type=type;o.frequency.setValueAtTime(freq,now);
if(freqEnd)o.frequency.exponentialRampToValueAtTime(Math.max(freqEnd,1),now+dur);
g.gain.setValueAtTime(vol,now);g.gain.exponentialRampToValueAtTime(0.001,now+dur);
if(filterF){const f=audioCtx.createBiquadFilter();f.type='lowpass';f.frequency.setValueAtTime(filterF,now);o.connect(f);f.connect(g);}else{o.connect(g);}
g.connect(audioCtx.destination);o.start(now);o.stop(now+dur);}
function _noise(dur,vol,delay,bpFreq,bpQ){
if(!audioCtx)return;const now=audioCtx.currentTime+(delay||0);
const len=audioCtx.sampleRate*Math.min(dur,2),buf=audioCtx.createBuffer(1,len,audioCtx.sampleRate);
const d=buf.getChannelData(0);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1);
const src=audioCtx.createBufferSource();src.buffer=buf;
const g=audioCtx.createGain();g.gain.setValueAtTime(vol,now);g.gain.exponentialRampToValueAtTime(0.001,now+dur);
const f=audioCtx.createBiquadFilter();f.type='bandpass';f.frequency.setValueAtTime(bpFreq||1000,now);f.Q.setValueAtTime(bpQ||1,now);
src.connect(f);f.connect(g);g.connect(audioCtx.destination);src.start(now);src.stop(now+dur);}

const Music={
nodes:[],masterGain:null,currentTrack:'',fadeGain:null,
patternTimer:0,patternStep:0,arpTimer:0,arpStep:0,bassTimer:0,bassStep:0,
padNodes:[],arpNodes:[],bassNode:null,running:false,

init(){
if(!audioCtx||this.masterGain)return;
this.masterGain=audioCtx.createGain();
this.masterGain.gain.setValueAtTime((settings.musicVol/100)*0.12,audioCtx.currentTime);
this.masterGain.connect(audioCtx.destination);
},

updateVolume(){
if(!this.masterGain||!audioCtx)return;
const v=(settings.musicVol/100)*0.12;
try{this.masterGain.gain.setTargetAtTime(v,audioCtx.currentTime,0.1);}catch(e){}
},

stopAll(){
try{
for(const n of this.nodes){try{if(n.stop)n.stop();if(n.disconnect)n.disconnect();}catch(e){}}
this.nodes=[];this.padNodes=[];this.arpNodes=[];
if(this.bassNode){try{this.bassNode.stop();this.bassNode.disconnect();}catch(e){}}this.bassNode=null;
this.running=false;this.currentTrack='';
}catch(e){}
},

_pad(freq,type,vol,detune){
if(!audioCtx)return null;
const o=audioCtx.createOscillator(),g=audioCtx.createGain();
const f=audioCtx.createBiquadFilter();f.type='lowpass';f.frequency.setValueAtTime(800,audioCtx.currentTime);
o.type=type||'sine';o.frequency.setValueAtTime(freq,audioCtx.currentTime);
if(detune)o.detune.setValueAtTime(detune,audioCtx.currentTime);
g.gain.setValueAtTime(vol||0.02,audioCtx.currentTime);
o.connect(f);f.connect(g);g.connect(this.masterGain);
o.start();this.nodes.push(o);this.padNodes.push({osc:o,gain:g,filter:f});
return{osc:o,gain:g,filter:f};
},

_bass(freq,type){
if(!audioCtx)return;
const o=audioCtx.createOscillator(),g=audioCtx.createGain();
const f=audioCtx.createBiquadFilter();f.type='lowpass';f.frequency.setValueAtTime(200,audioCtx.currentTime);
o.type=type||'sine';o.frequency.setValueAtTime(freq,audioCtx.currentTime);
g.gain.setValueAtTime(0.025,audioCtx.currentTime);
o.connect(f);f.connect(g);g.connect(this.masterGain);
o.start();this.nodes.push(o);this.bassNode=o;this.bassGain=g;this.bassFilter=f;
},

play(track){
if(!audioCtx||!audioEnabled)return;
if(track===this.currentTrack&&this.running)return;
this.init();this.stopAll();this.currentTrack=track;this.running=true;
this.patternStep=0;this.arpStep=0;this.bassStep=0;
this.patternTimer=0;this.arpTimer=0;this.bassTimer=0;

if(track==='menu')this._startMenu();
else if(track==='urban')this._startUrban();
else if(track==='volcanic')this._startVolcanic();
else if(track==='arctic')this._startArctic();
},

// Menu: ethereal pads, slow arp, mysterious
_startMenu(){
this._pad(65.41,  'sine',0.018,0);   // C2
this._pad(98.00,  'sine',0.014,7);   // G2 detuned
this._pad(130.81, 'triangle',0.010,-5); // C3

// High shimmer
const sh=this._pad(523.25,'sine',0.004,0);

},

// Urban: tense, pulsing, cyberpunk
_startUrban(){

this._pad(110.00,'sawtooth',0.012,0);  // A2

},

_startVolcanic(){

this._pad(82.41, 'sawtooth',0.015,0);  // E2
this._pad(123.47,'sawtooth',0.010,10); // B2
this._pad(164.81,'triangle',0.008,-8); // E3
this._pad(246.94,'sine',0.005,0);      // B3
},

// Arctic: clean, crystalline, spacious
_startArctic(){
this._bass(73.42,'sine'); // D2

this._pad(220.00,'triangle',0.010,5);// A3

},

// Called from game loop to evolve the music over time
update(dt){
if(!this.running||!audioCtx||!this.masterGain)return;
const t=audioCtx.currentTime;

// Pad modulation — slowly sweep filter and gain for movement
for(const p of this.padNodes){
try{
const base=this.currentTrack==='volcanic'?500:this.currentTrack==='arctic'?1200:800;
const mod=Math.sin(t*0.3+this.padNodes.indexOf(p)*1.5)*300;
p.filter.frequency.setTargetAtTime(Math.max(200,base+mod),t,0.5);
}catch(e){}
}

// Arpeggio pattern
this.arpTimer-=dt;
if(this.arpTimer<=0){
this.arpTimer=this.currentTrack==='menu'?0.5:this.currentTrack==='volcanic'?0.3:this.currentTrack==='arctic'?0.6:0.25;
this._playArpNote();
}

// Bass movement
this.bassTimer-=dt;
if(this.bassTimer<=0){
this.bassTimer=this.currentTrack==='volcanic'?0.8:this.currentTrack==='urban'?1.0:2.0;
this._moveBass();
}
},

_playArpNote(){
if(!audioCtx||settings.musicVol<=0)return;
const patterns={
menu:[523.25,659.25,783.99,659.25,523.25,392.00,440.00,392.00],
urban:[220,277.18,329.63,440,329.63,277.18,220,164.81],
volcanic:[164.81,196.00,246.94,329.63,246.94,196.00,164.81,123.47],
arctic:[293.66,349.23,440.00,523.25,440.00,349.23,293.66,220.00]
};
const p=patterns[this.currentTrack]||patterns.menu;
const freq=p[this.arpStep%p.length];
this.arpStep++;
const now=audioCtx.currentTime;
const o=audioCtx.createOscillator(),g=audioCtx.createGain();
const f=audioCtx.createBiquadFilter();f.type='lowpass';
f.frequency.setValueAtTime(this.currentTrack==='arctic'?2000:this.currentTrack==='volcanic'?1000:1500,now);
o.type=this.currentTrack==='volcanic'?'sawtooth':this.currentTrack==='urban'?'square':'sine';
o.frequency.setValueAtTime(freq,now);
const vol=(settings.musicVol/100)*0.02;
g.gain.setValueAtTime(vol,now);
g.gain.exponentialRampToValueAtTime(0.001,now+(this.currentTrack==='arctic'?0.5:0.2));
o.connect(f);f.connect(g);g.connect(this.masterGain);
o.start(now);o.stop(now+0.5);
},

_moveBass(){
if(!this.bassNode||!audioCtx)return;
const roots={
menu:[65.41,73.42,82.41,65.41],
urban:[55,61.74,73.42,55],
volcanic:[41.20,49.00,55.00,41.20],
arctic:[73.42,82.41,98.00,73.42]
};
const r=roots[this.currentTrack]||roots.menu;
this.bassStep=(this.bassStep+1)%r.length;
try{this.bassNode.frequency.setTargetAtTime(r[this.bassStep],audioCtx.currentTime,0.3);}catch(e){}
}
};

// Pools
class Pool{constructor(f,n){this.pool=[];this.factory=f;for(let i=0;i<n;i++){const o=f();o.active=false;this.pool.push(o);}}
get(){for(let i=0;i<this.pool.length;i++)if(!this.pool[i].active){this.pool[i].active=true;return this.pool[i];}return null;}
release(o){o.active=false;}
forEach(fn){for(let i=0;i<this.pool.length;i++)if(this.pool[i].active)fn(this.pool[i]);}
count(){let c=0;for(let i=0;i<this.pool.length;i++)if(this.pool[i].active)c++;return c;}}

const STORAGE_PREFIX = 'sd_';
let storageAvailable = false;
const _sto = (function(){try{return window[['local','Storage'].join('')]}catch(e){return null}}());

function checkStorage() {
  try {
    if(!_sto) return;
    const test = '__sd_test__';
    _sto.setItem(test, '1');
    _sto.removeItem(test);
    storageAvailable = true;
  } catch(e) { storageAvailable = false; }
}
checkStorage();

function saveState(key, data) {
  if (!storageAvailable||!_sto) return;
  try { _sto.setItem(STORAGE_PREFIX + key, JSON.stringify(data)); } catch(e) {}
}

function loadState(key) {
  if (!storageAvailable||!_sto) return null;
  try {
    const d = _sto.getItem(STORAGE_PREFIX + key);
    return d ? JSON.parse(d) : null;
  } catch(e) { return null; }
}

function loadAllState() {
  const s = loadState('settings');
  if (s) Object.assign(settings, s);

  const m = loadState('mastery');
  if (m) Object.assign(towerMasteryKills, m);

  const p = loadState('prog');
  if (p) Object.assign(prog, p);

  const l = loadState('loadout');
  if (l) {
    loadout.unlockedCards = new Set(l.unlockedCards || []);
    loadout.equippedCards = new Set(l.equippedCards || []);
    if (l.unlockedSkins) loadout.unlockedSkins = l.unlockedSkins;
    if (l.equippedSkins) loadout.equippedSkins = l.equippedSkins;
    if (l.matchCount !== undefined) loadout.matchCount = l.matchCount;
  }

  const c = loadState('campaign');
  if (c) Object.assign(campaign, c);

  const a = loadState('achievements');
  if (a) achievements.unlocked = new Set(a);

  const cl = loadState('clash');
  if (cl) { clash.elo = cl.elo ?? 1000; clash.totalPvpWins = cl.totalPvpWins ?? 0; }

  const sw = loadState('swarm');

}

let currentPaths=[],pathSets=[];
function setupMap(idx){const m=MAPS[idx];currentCols=m.cols;currentRows=m.rows;currentPaths=m.paths;pathSets=[];for(const p of currentPaths){const s=new Set();p.forEach(([c,r])=>s.add(c+','+r));pathSets.push(s);}recalcLayout();VFX.initEnvParticles(m.biome,W,H);}
function isPathCell(c,r){const k=c+','+r;for(const s of pathSets)if(s.has(k))return true;return false;}
function isValidPlacement(c,r){if(c<0||c>=currentCols||r<0||r>=currentRows)return false;if(isPathCell(c,r))return false;for(let dc=-1;dc<=1;dc++)for(let dr=-1;dr<=1;dr++){if(dc===0&&dr===0)continue;if(Math.abs(dc)+Math.abs(dr)>1)continue;if(isPathCell(c+dc,r+dr))return true;}return false;}
function getPathPts(pi){const p=currentPaths[pi]||currentPaths[0];return p.map(([c,r])=>({x:offsetX+c*cellSize+cellSize/2,y:offsetY+r*cellSize+cellSize/2}));}
function getPosOnPath(prog,pi){const pts=getPathPts(pi);if(prog<=0)return{x:pts[0].x,y:pts[0].y};if(prog>=1)return{x:pts[pts.length-1].x,y:pts[pts.length-1].y};let tl=0;const sl=[];for(let i=1;i<pts.length;i++){const dx=pts[i].x-pts[i-1].x,dy=pts[i].y-pts[i-1].y;sl.push(Math.sqrt(dx*dx+dy*dy));tl+=sl[sl.length-1];}let td=prog*tl;for(let i=0;i<sl.length;i++){if(td<=sl[i]){const t=td/sl[i];return{x:pts[i].x+(pts[i+1].x-pts[i].x)*t,y:pts[i].y+(pts[i+1].y-pts[i].y)*t};}td-=sl[i];}return{x:pts[pts.length-1].x,y:pts[pts.length-1].y};}
function getPathLen(pi){const pts=getPathPts(pi);let tl=0;for(let i=1;i<pts.length;i++){const dx=pts[i].x-pts[i-1].x,dy=pts[i].y-pts[i-1].y;tl+=Math.sqrt(dx*dx+dy*dy);}return tl;}
function getBiome(){return BIOMES[MAPS[G.mapIdx].biome]||BIOMES.urban;}
function getAvailableTowers(){const m=MAPS[G.mapIdx];if(!m.restricted||!m.restricted.length)return TT;return TT.filter(t=>!m.restricted.includes(t.id));}

// Damage
function applyDamage(e,dmg,splash,slows,disHeal,isNuke,towerTypeId){if(loadoutBonuses.luckyStrike&&Math.random()<0.1)dmg*=2;if(loadoutBonuses.reflectChance&&Math.random()<loadoutBonuses.reflectChance){const rd=Math.floor(dmg*0.2);e.hp-=rd;spawnDmgNum(e.px,e.py-5,rd,'#88ddff');}splash*=loadoutBonuses.splatMultiplier;
const eff=Math.max(1,dmg-(e.empTimer>0?0:e.armor));e.hp-=eff;VFX.addHitFlash(e.id);
spawnDmgNum(e.px,e.py,eff,C_DNG);
if(slows)e.slowTimer=2.0;if(disHeal)e.healDisabled=3.0;
if(e.hp<=0&&e.alive)killEnemy(e,towerTypeId);
if(splash>0){const sp=splash*cellSize*(isNuke?2:1);for(let i=0;i<G.enemies.length;i++){const o=G.enemies[i];if(o===e||!o.alive)continue;const dx=o.px-e.px,dy=o.py-e.py;if(Math.sqrt(dx*dx+dy*dy)<sp){const sd=Math.max(1,Math.floor(dmg*(isNuke?0.8:0.5))-(o.empTimer>0?0:o.armor));o.hp-=sd;spawnDmgNum(o.px,o.py,sd,C_WRN);if(slows)o.slowTimer=2.0;if(disHeal)o.healDisabled=3.0;if(o.hp<=0&&o.alive)killEnemy(o,towerTypeId);}}}}
function applySplashDmg(px,py,dmg,splash){const sp=splash*cellSize;for(let i=0;i<G.enemies.length;i++){const e=G.enemies[i];if(!e.alive)continue;const dx=e.px-px,dy=e.py-py;if(Math.sqrt(dx*dx+dy*dy)<sp){const sd=Math.max(1,Math.floor(dmg*0.5)-(e.empTimer>0?0:e.armor));e.hp-=sd;spawnDmgNum(e.px,e.py,sd,C_WRN);if(e.hp<=0&&e.alive)killEnemy(e);}}}
function killEnemy(e,towerTypeId){e.alive=false;const scavBonus=loadoutBonuses.scavengerBonus;const d=DIFFS[G.diffIdx];const rew=Math.round(e.reward*d.rewM);G.nexium+=Math.round(rew*(1+scavBonus+(campaign.active?campaignResearch.nexiumBonus:0)));G.score+=rew;G.totalKills++;G.waveKills++;G.totalNexEarned+=rew;G.waveNex+=rew;G.enemiesAlive=Math.max(0,G.enemiesAlive-1);emitP(e.px,e.py,18,e.color,120,0.7,5);emitP(e.px,e.py,8,'#ffffff',80,0.3,2);VFX.addDeathRing(e.px,e.py,e.color,e.size*cellSize*3);
tryVibrate(25);if(towerTypeId)towerMasteryKills[towerTypeId]=(towerMasteryKills[towerTypeId]||0)+1;
if(e.explodes){emitP(e.px,e.py,25,'#aaff22',150,0.8,5);playSound('explosion');}
if(e.releases){for(let i=0;i<6;i++){spawnEnemy('skitterling',e.pathIdx,e.progress);}}
if(e.type==='devastator'||e.type==='hivemind'){G.shakeTimer=0.3;G.shakeIntensity=e.type==='devastator'?6:4;}
playSound('explosion');}

// Enemies
function spawnEnemy(typeName,pathIdx,startProg){const type=ET[typeName];if(!type)return;const d=DIFFS[G.diffIdx];
const e={id:nextEnemyId++,type:typeName,hp:Math.round(type.hp*d.hpM),maxHp:Math.round(type.hp*d.hpM),speed:type.speed*d.spdM,reward:type.reward,livesCost:type.lives,color:type.color,shape:type.shape,size:type.size,armor:type.armor,flying:type.flying,explodes:!!type.explodes,spawns:!!type.spawns,heals:!!type.heals,burrows:!!type.burrows,releases:!!type.releases,phases:!!type.phases,disables:!!type.disables,
progress:startProg||0,pathIdx:pathIdx||0,px:0,py:0,alive:true,slowTimer:0,empTimer:0,stunTimer:0,healDisabled:0,spawnCD:3,fadeIn:0.5,
burrowTimer:0,burrowCooldown:5,burrowed:false,phaseTimer:0,phaseCooldown:4,phased:false,disableTimer:0};
const pos=getPosOnPath(e.progress,e.pathIdx);e.px=pos.x;e.py=pos.y;G.enemies.push(e);G.enemiesAlive++;}

function spawnSwarmer(px,py,pathIdx,progress){const d=DIFFS[G.diffIdx];const e={id:nextEnemyId++,type:'swarmer',hp:Math.round(15*d.hpM),maxHp:Math.round(15*d.hpM),speed:2.0*d.spdM,reward:2,livesCost:0,color:'#9944cc',shape:'circle',size:0.15,armor:0,flying:false,explodes:false,spawns:false,heals:false,burrows:false,releases:false,phases:false,disables:false,progress:progress,pathIdx:pathIdx,px:px,py:py,alive:true,slowTimer:0,empTimer:0,stunTimer:0,healDisabled:0,spawnCD:999,fadeIn:0,burrowTimer:0,burrowCooldown:999,burrowed:false,phaseTimer:0,phaseCooldown:999,phased:false,disableTimer:0};G.enemies.push(e);G.enemiesAlive++;}

function updateEnemies(dt){
for(let i=G.enemies.length-1;i>=0;i--){const e=G.enemies[i];if(!e.alive)continue;
if(e.fadeIn>0)e.fadeIn-=dt;
if(e.stunTimer>0){e.stunTimer-=dt;continue;}
if(e.slowTimer>0)e.slowTimer-=dt;if(e.empTimer>0)e.empTimer-=dt;if(e.healDisabled>0)e.healDisabled-=dt;
// Tunneler burrow
if(e.burrows){e.burrowCooldown-=dt;if(!e.burrowed&&e.burrowCooldown<=0){e.burrowed=true;e.burrowTimer=2.0;e.burrowCooldown=8;playSound('burrow');}
if(e.burrowed){e.burrowTimer-=dt;e.progress+=0.08*dt;if(e.burrowTimer<=0){e.burrowed=false;}}}
// Phase Wraith
if(e.phases){e.phaseCooldown-=dt;if(!e.phased&&e.phaseCooldown<=0){e.phased=true;e.phaseTimer=1.5;e.phaseCooldown=4;playSound('phase');}
if(e.phased){e.phaseTimer-=dt;if(e.phaseTimer<=0)e.phased=false;}}
// Siege Crawler disable
if(e.disables){e.disableTimer-=dt;if(e.disableTimer<=0){e.disableTimer=2;for(const t of G.towers){const tx=offsetX+t.col*cellSize+cellSize/2,ty=offsetY+t.row*cellSize+cellSize/2;const dx=tx-e.px,dy=ty-e.py;if(Math.sqrt(dx*dx+dy*dy)<cellSize*2){t.disabled=3;playSound('disable');emitP(tx,ty,8,'#ff3333',60,0.3,3);}}}}
let spd=e.speed;if(e.slowTimer>0)spd*=0.4;
if(!e.burrowed){const pathLen=getPathLen(e.pathIdx);e.progress+=(spd*cellSize*dt)/pathLen;}
if(e.progress>=1){e.alive=false;G.lives-=e.livesCost;G.enemiesAlive--;emitP(e.px,e.py,8,C_DNG,80,0.4,3);if(G.lives<=0&&loadoutBonuses.emergencyFund&&!loadoutBonuses.emergencyUsed){loadoutBonuses.emergencyUsed=true;G.nexium+=100;G.lives=1;emitP(W/2,H/2,20,'#ffcc00',150,0.8,4);}else if(G.lives<=0){G.lives=0;G.phase='gameover';saveAllState();playSound('gameover');tryVibrate([100,30,100,30,200]);}continue;}
const pos=getPosOnPath(e.progress,e.pathIdx);e.px=pos.x;e.py=pos.y;
if(e.spawns){e.spawnCD-=dt;if(e.spawnCD<=0){e.spawnCD=4;spawnSwarmer(e.px,e.py,e.pathIdx,e.progress);spawnSwarmer(e.px,e.py,e.pathIdx,e.progress);}}
if(e.heals&&e.healDisabled<=0){const hr=cellSize*2.5,ha=5*dt;for(const o of G.enemies){if(o===e||!o.alive)continue;const dx=o.px-e.px,dy=o.py-e.py;if(Math.sqrt(dx*dx+dy*dy)<hr&&o.healDisabled<=0)o.hp=Math.min(o.maxHp,o.hp+ha);}}}
G.enemies=G.enemies.filter(e=>e.alive||e.progress<1);}

function drawEnemy(e){const s=e.size*cellSize,x=e.px,y=e.py;ctx.save();
// Add trail
if(!e.burrowed&&!e.phased)VFX.addTrail(x,y,e.color,s*0.6);
if(e.fadeIn>0)ctx.globalAlpha=Math.max(0,1-e.fadeIn*2);
if(e.burrowed){ctx.globalAlpha*=0.2+0.1*Math.sin(performance.now()*0.01);}
if(e.phased){ctx.globalAlpha*=0.15+0.1*Math.sin(performance.now()*0.008);}
// Enhanced flying shadow
if(e.flying){const so=3+Math.sin(animTime*3)*1;ctx.fillStyle='rgba(0,0,0,0.25)';ctx.beginPath();ctx.ellipse(x+so,y+s+6,s*0.8,s*0.25,0,0,Math.PI*2);ctx.fill();}
// Status effects
if(e.slowTimer>0){ctx.shadowColor='#aa44ff';ctx.shadowBlur=10;}
if(e.stunTimer>0){ctx.shadowColor='#aaddff';ctx.shadowBlur=12;}
// Hit flash
const hf=VFX.hitFlash[e.id];if(hf){ctx.fillStyle='rgba(255,255,255,'+(hf/0.12*0.6)+')';const fs=s*1.3;ctx.beginPath();ctx.arc(x,y,fs,0,Math.PI*2);ctx.fill();}
// Boss aura
const isBoss=e.type==='devastator'||e.type==='hivemind'||e.type==='siegecrawler';
if(isBoss){const ba=0.06+0.03*Math.sin(animTime*2);ctx.fillStyle=e.color.replace(')',','+ba+')').replace('rgb','rgba').replace('#','');ctx.globalAlpha*=1;ctx.shadowColor=e.color;ctx.shadowBlur=15;ctx.beginPath();ctx.arc(x,y,s*1.6,0,Math.PI*2);ctx.fill();ctx.shadowBlur=e.slowTimer>0?10:e.stunTimer>0?12:0;}
ctx.fillStyle=e.color;
const sh=e.shape;
if(sh==='baneCircle'){const p=1+0.1*Math.sin(performance.now()*0.008);ctx.beginPath();ctx.arc(x,y,s*p,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#ddff44';ctx.lineWidth=1.5;ctx.stroke();// Inner toxic ring
ctx.globalAlpha*=0.4;ctx.strokeStyle='#88ff00';ctx.lineWidth=0.5;ctx.beginPath();ctx.arc(x,y,s*p*0.5,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;}
else if(sh==='pentagon'){ctx.beginPath();for(let i=0;i<5;i++){const a=Math.PI*2/5*i-Math.PI/2;if(i===0)ctx.moveTo(x+s*Math.cos(a),y+s*Math.sin(a));else ctx.lineTo(x+s*Math.cos(a),y+s*Math.sin(a));}ctx.closePath();ctx.fill();// Inner star
ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=0.5;ctx.beginPath();for(let i=0;i<5;i++){const a2=Math.PI*2/5*i-Math.PI/2,a3=Math.PI*2/5*((i+2)%5)-Math.PI/2;ctx.moveTo(x+s*0.5*Math.cos(a2),y+s*0.5*Math.sin(a2));ctx.lineTo(x+s*0.5*Math.cos(a3),y+s*0.5*Math.sin(a3));}ctx.stroke();// Orbiting dots
for(let od=0;od<3;od++){const oa=animTime*2+od*Math.PI*2/3;ctx.fillStyle='rgba(119,34,170,0.6)';ctx.beginPath();ctx.arc(x+Math.cos(oa)*s*1.2,y+Math.sin(oa)*s*1.2,2,0,Math.PI*2);ctx.fill();}}
else if(sh==='octagon'){ctx.beginPath();for(let i=0;i<8;i++){const a=Math.PI*2/8*i-Math.PI/8;if(i===0)ctx.moveTo(x+s*Math.cos(a),y+s*Math.sin(a));else ctx.lineTo(x+s*Math.cos(a),y+s*Math.sin(a));}ctx.closePath();ctx.fill();// Cross pattern
ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(x-s*0.5,y);ctx.lineTo(x+s*0.5,y);ctx.moveTo(x,y-s*0.5);ctx.lineTo(x,y+s*0.5);ctx.stroke();
if(e.heals&&e.healDisabled<=0){const p=0.5+0.2*Math.sin(performance.now()*0.004);ctx.fillStyle='rgba(34,119,68,'+(0.06*p)+')';ctx.beginPath();ctx.arc(x,y,cellSize*2.5,0,Math.PI*2);ctx.fill();}}
else if(sh==='circle'){ctx.beginPath();ctx.arc(x,y,s,0,Math.PI*2);ctx.fill();// Leg lines (skitterling)
ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=0.5;for(let lg=0;lg<4;lg++){const la=Math.PI/4+lg*Math.PI/2+Math.sin(animTime*8+lg)*0.2;ctx.beginPath();ctx.moveTo(x+Math.cos(la)*s*0.6,y+Math.sin(la)*s*0.6);ctx.lineTo(x+Math.cos(la)*s*1.3,y+Math.sin(la)*s*1.3);ctx.stroke();}// Core dot
ctx.fillStyle='rgba(255,255,255,0.25)';ctx.beginPath();ctx.arc(x,y,s*0.3,0,Math.PI*2);ctx.fill();}
else if(sh==='diamond'){ctx.beginPath();ctx.moveTo(x,y-s);ctx.lineTo(x+s*0.7,y);ctx.lineTo(x,y+s);ctx.lineTo(x-s*0.7,y);ctx.closePath();ctx.fill();// Inner cross
ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(x,y-s*0.4);ctx.lineTo(x,y+s*0.4);ctx.moveTo(x-s*0.3,y);ctx.lineTo(x+s*0.3,y);ctx.stroke();}
else if(sh==='roundrect'){ctx.beginPath();ctx.roundRect(x-s,y-s*0.7,s*2,s*1.4,s*0.3);ctx.fill();// Armor lines
ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=0.5;for(let al=0;al<3;al++){const ay=y-s*0.3+al*s*0.3;ctx.beginPath();ctx.moveTo(x-s*0.7,ay);ctx.lineTo(x+s*0.7,ay);ctx.stroke();}}
else if(sh==='triangle'||sh==='phaseTriangle'){const wf=sh==='phaseTriangle'?1+0.1*Math.sin(animTime*5):1;ctx.beginPath();ctx.moveTo(x,y-s*wf);ctx.lineTo(x+s*wf,y+s*0.7*wf);ctx.lineTo(x-s*wf,y+s*0.7*wf);ctx.closePath();ctx.fill();// Wing detail
if(sh==='triangle'&&e.flying){ctx.strokeStyle='rgba(255,255,255,0.12)';ctx.lineWidth=0.5;const wFlap=Math.sin(animTime*6)*s*0.1;ctx.beginPath();ctx.moveTo(x-s*0.6,y+s*0.3+wFlap);ctx.lineTo(x+s*0.6,y+s*0.3-wFlap);ctx.stroke();}}
else if(sh==='hexagon'||sh==='siegeHex'){ctx.beginPath();for(let i=0;i<6;i++){const a=Math.PI/3*i-Math.PI/6;if(i===0)ctx.moveTo(x+s*Math.cos(a),y+s*Math.sin(a));else ctx.lineTo(x+s*Math.cos(a),y+s*Math.sin(a));}ctx.closePath();ctx.fill();
if(sh==='siegeHex'){// Rotating turret
ctx.strokeStyle='#ff6666';ctx.lineWidth=1.5;const tAng=animTime*1.5;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+Math.cos(tAng)*s*1.1,y+Math.sin(tAng)*s*1.1);ctx.stroke();// Pulsing core
ctx.fillStyle='rgba(255,100,100,0.3)';ctx.beginPath();ctx.arc(x,y,s*0.3,0,Math.PI*2);ctx.fill();}
else{// Devastator inner hex + spikes
ctx.strokeStyle='rgba(255,255,255,0.12)';ctx.lineWidth=0.5;ctx.beginPath();for(let i=0;i<6;i++){const a=Math.PI/3*i-Math.PI/6+animTime*0.5;const r2=s*0.5;if(i===0)ctx.moveTo(x+r2*Math.cos(a),y+r2*Math.sin(a));else ctx.lineTo(x+r2*Math.cos(a),y+r2*Math.sin(a));}ctx.closePath();ctx.stroke();}}
else if(sh==='tunneler'){const o=e.burrowed?0.3:1;ctx.globalAlpha*=o;ctx.beginPath();ctx.moveTo(x,y-s);ctx.lineTo(x+s*0.7,y);ctx.lineTo(x,y+s);ctx.lineTo(x-s*0.7,y);ctx.closePath();ctx.fill();// Drill rotation
const da=animTime*6;ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(x+Math.cos(da)*s*0.3,y-s+Math.sin(da)*s*0.2);ctx.lineTo(x-Math.cos(da)*s*0.3,y-s-Math.sin(da)*s*0.2);ctx.stroke();}
else if(sh==='swarmCircle'){const p=1+0.15*Math.sin(performance.now()*0.006);ctx.beginPath();ctx.arc(x,y,s*p,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#22aa22';ctx.lineWidth=2;ctx.stroke();// Cargo pods
for(let cp=0;cp<4;cp++){const ca=Math.PI/2*cp+animTime*0.5;ctx.fillStyle='rgba(68,204,68,0.4)';ctx.fillRect(x+Math.cos(ca)*s*0.4-2,y+Math.sin(ca)*s*0.4-2,4,4);}}
ctx.shadowBlur=0;ctx.globalAlpha=1;ctx.restore();
// Health bar with glow
if(e.hp<e.maxHp&&!e.burrowed){const bw=s*2.5,bh2=3,bx=x-bw/2,by2=y-s-8;ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(bx-1,by2-1,bw+2,bh2+2);const r=e.hp/e.maxHp;const hc=r>0.6?'#44ff44':r>0.3?C_WRN:C_DNG;ctx.fillStyle=hc;ctx.fillRect(bx,by2,bw*Math.max(0,r),bh2);ctx.shadowColor=hc;ctx.shadowBlur=3;ctx.fillRect(bx,by2,bw*Math.max(0,r),bh2);ctx.shadowBlur=0;}
if(e.stunTimer>0){ctx.font='600 '+Math.max(8,s)+'px '+FB;ctx.textAlign='center';ctx.fillStyle='#aaddff';ctx.fillText('⚡',x,y-s-12);}}

// Tower placement & management
function isTowerRestricted(towerIdx){const m=MAPS[G.mapIdx];if(!m.restricted||!m.restricted.length)return false;return m.restricted.includes(TT[towerIdx].id);}
function placeTower(col,row,typeIdx){const type=TT[typeIdx];const d=DIFFS[G.diffIdx];const cost=Math.round(type.cost*d.costM);if(G.nexium<cost)return false;if(!isValidPlacement(col,row))return false;if(isTowerRestricted(typeIdx))return false;for(const t of G.towers)if(t.col===col&&t.row===row)return false;G.nexium-=cost;G.totalNexSpent+=cost;G.towersPlaced++;G.towers.push({col,row,typeIdx,level:0,cooldown:0,totalSpent:cost,abilityCooldown:0,abilityActive:0,overcharged:false,beamTarget:null,disabled:0,chainTargets:null,overloadNext:false,droneCount:3});G.placementAnims.push({x:offsetX+col*cellSize+cellSize/2,y:offsetY+row*cellSize+cellSize/2,timer:0.4});playSound('place');tryVibrate(10);return true;}
function upgradeTower(idx){const t=G.towers[idx];const type=TT[t.typeIdx];if(t.level>=2)return false;const d=DIFFS[G.diffIdx];const cost=Math.round(type.upCost[t.level]*d.costM);if(G.nexium<cost)return false;G.nexium-=cost;G.totalNexSpent+=cost;t.totalSpent+=cost;t.level++;playSound('place');return true;}
function sellTower(idx){const t=G.towers[idx];const ref=Math.floor(t.totalSpent*loadoutBonuses.sellMultiplier);G.nexium+=ref;G.towers.splice(idx,1);playSound('sell');}
function getTowerStats(t){const type=TT[t.typeIdx];const m=1+t.level*0.4,rm=1+t.level*0.15;let frm=(1-t.level*0.1)*(loadoutBonuses.fireRateMultiplier||1.0);if(t.abilityActive>0&&type.ab.type==='stim')frm*=0.5;if(G.chronoActive>0)frm*=0.67;let dm=m;if(t.abilityActive>0&&type.ab.type==='meltdown')dm*=2;if(t.abilityActive>0&&type.ab.type==='fortify')dm*=2;return{damage:Math.round(type.damage*dm),range:type.range*rm,fireRate:type.fireRate*frm,splash:type.splash*(1+t.level*0.2),slows:type.slows||(t.abilityActive>0&&type.ab.type==='fortify'),antiAir:type.antiAir,disableHeal:type.id==='shockwave'};}
function getTowerCost(idx){return Math.round(TT[idx].cost*DIFFS[G.diffIdx].costM);}

function activateAbility(idx){const t=G.towers[idx];const type=TT[t.typeIdx];if(t.abilityCooldown>0)return false;const ab=type.ab;t.abilityCooldown=ab.cd;const tx=offsetX+t.col*cellSize+cellSize/2,ty=offsetY+t.row*cellSize+cellSize/2;const stats=getTowerStats(t);const rp=stats.range*cellSize;
switch(ab.type){
case'stim':t.abilityActive=ab.dur;break;
case'nuke':{let best=null,bp=-1;for(const e of G.enemies){if(!e.alive||e.burrowed||e.phased)continue;const dx=e.px-tx,dy=e.py-ty;if(Math.sqrt(dx*dx+dy*dy)<=rp*1.5&&e.progress>bp){best=e;bp=e.progress;}}if(best){const p=projectilePool.get();if(p){p.x=tx;p.y=ty;p.tx=best.px;p.ty=best.py;p.speed=200;p.damage=stats.damage*3;p.splash=stats.splash*2;p.slows=false;p.disableHeal=false;p.color='#ff4400';p.targetId=best.id;p.isNuke=true;}}break;}
case'flak':for(let a=0;a<8;a++){const ang=Math.PI*2/8*a;let target=null;for(const e of G.enemies){if(!e.alive)continue;const dx=e.px-tx,dy=e.py-ty;if(Math.sqrt(dx*dx+dy*dy)<=rp){target=e;break;}}const p=projectilePool.get();if(p){p.x=tx;p.y=ty;p.tx=tx+Math.cos(ang)*rp;p.ty=ty+Math.sin(ang)*rp;if(target){p.tx=target.px;p.ty=target.py;p.targetId=target.id;}p.speed=500;p.damage=stats.damage;p.splash=0;p.slows=false;p.disableHeal=false;p.color='#ff3344';p.isNuke=false;}}break;
case'storm':t.abilityActive=ab.dur;break;
case'overcharge':t.overcharged=true;break;
case'empblast':for(const e of G.enemies){if(!e.alive)continue;const dx=e.px-tx,dy=e.py-ty;if(Math.sqrt(dx*dx+dy*dy)<=rp){e.stunTimer=3;e.empTimer=5;}}emitP(tx,ty,30,'#aaddff',200,0.5,3);playSound('emp');break;
case'meltdown':t.abilityActive=ab.dur;break;
case'overload':t.overloadNext=true;break;
case'swarm':t.abilityActive=ab.dur;t.droneCount=6;break;
case'fortify':t.abilityActive=ab.dur;break;
}playSound('ability');return true;}

function updateTowers(dt){
for(const t of G.towers){const type=TT[t.typeIdx];
if(t.disabled>0){t.disabled-=dt;continue;}
if(t.abilityCooldown>0)t.abilityCooldown-=dt;
if(t.abilityActive>0){t.abilityActive-=dt;if(t.abilityActive<=0&&type.ab.type==='swarm')t.droneCount=3;}
// Storm AOE
if(t.abilityActive>0&&type.ab.type==='storm'){const stats=getTowerStats(t);const rp=stats.range*cellSize;const tx=offsetX+t.col*cellSize+cellSize/2,ty=offsetY+t.row*cellSize+cellSize/2;for(const e of G.enemies){if(!e.alive||e.burrowed||e.phased)continue;const dx=e.px-tx,dy=e.py-ty;if(Math.sqrt(dx*dx+dy*dy)<=rp){e.hp-=stats.damage*3*dt;spawnDmgNum(e.px,e.py,stats.damage*3*dt,'#aa44ff');if(e.hp<=0&&e.alive)killEnemy(e,type.id);}}}
// Barrier AOE
if(type.id==='barrier'){const stats=getTowerStats(t);const rp=stats.range*cellSize;const tx=offsetX+t.col*cellSize+cellSize/2,ty=offsetY+t.row*cellSize+cellSize/2;const mult=t.abilityActive>0?2:1;for(const e of G.enemies){if(!e.alive||e.burrowed||e.phased)continue;const dx=e.px-tx,dy=e.py-ty;if(Math.sqrt(dx*dx+dy*dy)<=rp){e.hp-=stats.damage*mult*dt;e.slowTimer=0.5;if(e.hp<=0&&e.alive)killEnemy(e,type.id);}}}
// Drone Bay
if(type.id==='dronebay'){const stats=getTowerStats(t);const rp=stats.range*cellSize;const tx=offsetX+t.col*cellSize+cellSize/2,ty=offsetY+t.row*cellSize+cellSize/2;t.cooldown-=dt;if(t.cooldown<=0){t.cooldown=stats.fireRate;const dc=t.droneCount||3;let hits=0;for(const e of G.enemies){if(!e.alive||e.burrowed||e.phased||hits>=dc)continue;const dx=e.px-tx,dy=e.py-ty;if(Math.sqrt(dx*dx+dy*dy)<=rp){e.hp-=stats.damage;spawnDmgNum(e.px,e.py,stats.damage,type.color);if(e.hp<=0&&e.alive)killEnemy(e,type.id);hits++;emitP(e.px,e.py,3,type.color,40,0.2,2);}}if(hits>0)playSound('shoot','dronebay');}continue;}
t.cooldown-=dt;if(t.cooldown>0)continue;
const stats=getTowerStats(t);const rp=stats.range*cellSize;const tx=offsetX+t.col*cellSize+cellSize/2,ty=offsetY+t.row*cellSize+cellSize/2;
// Fusion beam
if(type.id==='fusion'){let cl=null,cd2=Infinity;for(const e of G.enemies){if(!e.alive||e.burrowed||e.phased)continue;const dx=e.px-tx,dy=e.py-ty;const dist=Math.sqrt(dx*dx+dy*dy);if(dist<=rp&&dist<cd2){cl=e;cd2=dist;}}if(cl){t.beamTarget={x:cl.px,y:cl.py,id:cl.id};t.cooldown=stats.fireRate;const ed=Math.max(1,stats.damage*dt*10-(cl.empTimer>0?0:cl.armor));cl.hp-=ed;spawnDmgNum(cl.px,cl.py,ed,type.color);if(cl.hp<=0&&cl.alive)killEnemy(cl,type.id);}else{t.beamTarget=null;}continue;}
// Arc Pylon chain lightning
if(type.id==='arcpylon'){let targets=[];let first=null,fp=-1;for(const e of G.enemies){if(!e.alive||e.burrowed||e.phased)continue;const dx=e.px-tx,dy=e.py-ty;if(Math.sqrt(dx*dx+dy*dy)<=rp&&e.progress>fp){first=e;fp=e.progress;}}if(first){t.cooldown=stats.fireRate;const maxChain=t.overloadNext?8:4;if(t.overloadNext)t.overloadNext=false;let cur=first;const hit=new Set([cur.id]);targets.push({x:tx,y:ty,ex:cur.px,ey:cur.py});let dmg=stats.damage;applyDamage(cur,dmg,0,false,false,false,type.id);for(let ch=1;ch<maxChain;ch++){let next=null,nd=Infinity;for(const e of G.enemies){if(!e.alive||hit.has(e.id)||e.burrowed||e.phased)continue;const dx=e.px-cur.px,dy=e.py-cur.py;const dist=Math.sqrt(dx*dx+dy*dy);if(dist<cellSize*3&&dist<nd){next=e;nd=dist;}}if(!next)break;targets.push({x:cur.px,y:cur.py,ex:next.px,ey:next.py});dmg=Math.max(1,Math.round(dmg*0.85));applyDamage(next,dmg,0,false,false,false,type.id);hit.add(next.id);cur=next;}for(const seg of targets){const c=chainPool.get();if(c){c.x1=seg.x;c.y1=seg.y;c.x2=seg.ex;c.y2=seg.ey;c.life=0.2;c.color='#88eeff';}}playSound('shoot','arcpylon');}continue;}
// Standard targeting
let best=null,bp=-1;for(const e of G.enemies){if(!e.alive||e.burrowed||e.phased)continue;if(e.flying&&!type.antiAir&&type.id!=='nova'&&type.id!=='shockwave')continue;const dx=e.px-tx,dy=e.py-ty;const dist=Math.sqrt(dx*dx+dy*dy);if(dist<=rp&&e.progress>bp){best=e;bp=e.progress;}}
if(best){t.cooldown=stats.fireRate;VFX.towerAngles[t.col+','+t.row]=Math.atan2(best.py-(offsetY+t.row*cellSize+cellSize/2),best.px-(offsetX+t.col*cellSize+cellSize/2));let dmg=stats.damage;if(t.overcharged){dmg*=5;t.overcharged=false;}const p=projectilePool.get();if(p){p.x=tx;p.y=ty;p.tx=best.px;p.ty=best.py;p.speed=type.id==='nova'?250:type.id==='shockwave'?350:400;p.damage=dmg;p.splash=stats.splash;p.slows=stats.slows;p.disableHeal=stats.disableHeal;p.color=type.color;p.targetId=best.id;p.isNuke=false;p._towerTypeId=type.id;}
playSound('shoot',type.id);}}}

function updateProjectiles(dt){projectilePool.forEach(proj=>{let target=null;if(proj.targetId>=0)for(let i=0;i<G.enemies.length;i++)if(G.enemies[i].id===proj.targetId&&G.enemies[i].alive){target=G.enemies[i];break;}
if(target){proj.tx=target.px;proj.ty=target.py;}const dx=proj.tx-proj.x,dy=proj.ty-proj.y;const dist=Math.sqrt(dx*dx+dy*dy);
if(dist<3){if(target&&target.alive&&!target.burrowed&&!target.phased){applyDamage(target,proj.damage,proj.splash,proj.slows,proj.disableHeal,proj.isNuke,proj._towerTypeId);}else if(proj.splash>0){applySplashDmg(proj.tx,proj.ty,proj.damage,proj.splash);}emitP(proj.x,proj.y,proj.splash>0?12:4,proj.color,proj.splash>0?120:60,0.4,proj.splash>0?4:2);if(proj.splash>0)playSound('explosion');projectilePool.release(proj);}else{const speed=proj.speed*dt;proj.x+=(dx/dist)*speed;proj.y+=(dy/dist)*speed;if(!proj._trail)proj._trail=[];proj._trail.push({x:proj.x,y:proj.y});if(proj._trail.length>8)proj._trail.shift();}});}

function updateParticles(dt){particlePool.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=30*dt;p.life-=dt;if(p.life<=0)particlePool.release(p);});}
function updateDmgNums(dt){dmgNumPool.forEach(d=>{d.y-=40*dt;d.life-=dt;if(d.life<=0)dmgNumPool.release(d);});}
function updateChains(dt){chainPool.forEach(c=>{c.life-=dt;if(c.life<=0)chainPool.release(c);});}

function drawParticles(){particlePool.forEach(p=>{const a=Math.max(0,p.life/p.maxLife);ctx.globalAlpha=a;ctx.fillStyle=p.color;const s=p.size*a;
if(p.shape==='circle'){ctx.beginPath();ctx.arc(p.x,p.y,s/2,0,Math.PI*2);ctx.fill();}
else if(p.shape==='line'){ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillRect(-s/2,-1,s,2);ctx.restore();}
else if(p.shape==='triangle'){ctx.beginPath();ctx.moveTo(p.x,p.y-s/2);ctx.lineTo(p.x+s/2,p.y+s/2);ctx.lineTo(p.x-s/2,p.y+s/2);ctx.closePath();ctx.fill();}
else{ctx.fillRect(p.x-s/2,p.y-s/2,s,s);}});ctx.globalAlpha=1;}
function drawProjectiles(){projectilePool.forEach(p=>{const tid=p._towerTypeId||'';ctx.shadowColor=p.color;ctx.shadowBlur=6;
// Trail
if(p._trail&&p._trail.length>0){for(let i=0;i<p._trail.length;i++){const t=p._trail[i],ta=(i/p._trail.length)*0.4;ctx.globalAlpha=ta;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(t.x,t.y,1.5,0,Math.PI*2);ctx.fill();}ctx.globalAlpha=1;}
if(tid==='hawk'){// Missile triangle
const ang=Math.atan2(p.ty-p.y,p.tx-p.x);ctx.save();ctx.translate(p.x,p.y);ctx.rotate(ang);ctx.fillStyle=p.color;ctx.beginPath();ctx.moveTo(5,0);ctx.lineTo(-3,-2.5);ctx.lineTo(-3,2.5);ctx.closePath();ctx.fill();ctx.restore();}
else if(tid==='thunder'||p.isNuke){// Large glowing orb
ctx.fillStyle=p.color;ctx.shadowBlur=12;ctx.beginPath();ctx.arc(p.x,p.y,p.isNuke?5:4,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(255,255,255,0.4)';ctx.beginPath();ctx.arc(p.x,p.y,2,0,Math.PI*2);ctx.fill();}
else if(tid==='nova'){// Star projectile
ctx.fillStyle=p.color;ctx.shadowBlur=10;ctx.beginPath();for(let i=0;i<6;i++){const a=Math.PI/3*i+animTime*5,r2=i%2===0?4:2;if(i===0)ctx.moveTo(p.x+r2*Math.cos(a),p.y+r2*Math.sin(a));else ctx.lineTo(p.x+r2*Math.cos(a),p.y+r2*Math.sin(a));}ctx.closePath();ctx.fill();}
else if(tid==='neural'){// Spiral dots
ctx.fillStyle=p.color;for(let i=0;i<3;i++){const a=animTime*8+i*Math.PI*2/3,or=2;ctx.beginPath();ctx.arc(p.x+Math.cos(a)*or,p.y+Math.sin(a)*or,1.2,0,Math.PI*2);ctx.fill();}}
else if(tid==='shockwave'){// Ring pulse
ctx.strokeStyle=p.color;ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(p.x,p.y,3+Math.sin(animTime*12)*1.5,0,Math.PI*2);ctx.stroke();}
else{// Default dot
ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.splash>0?3:2,0,Math.PI*2);ctx.fill();}
ctx.shadowBlur=0;});}
function drawDmgNums(){dmgNumPool.forEach(d=>{const a=Math.max(0,d.life/0.8);ctx.globalAlpha=a;ctx.font='700 '+Math.max(10,cellSize*0.28)+'px '+FD;ctx.textAlign='center';ctx.fillStyle=d.color;ctx.fillText(d.text,d.x,d.y);});ctx.globalAlpha=1;}
function drawChains(){chainPool.forEach(c=>{const a=Math.max(0,c.life/0.2);ctx.globalAlpha=a;ctx.strokeStyle=c.color;ctx.lineWidth=2;ctx.shadowColor=c.color;ctx.shadowBlur=8;ctx.beginPath();ctx.moveTo(c.x1,c.y1);const mx=(c.x1+c.x2)/2+(Math.random()-0.5)*10,my=(c.y1+c.y2)/2+(Math.random()-0.5)*10;ctx.quadraticCurveTo(mx,my,c.x2,c.y2);ctx.stroke();ctx.shadowBlur=0;});ctx.globalAlpha=1;}

// Wave spawning
function startWave(){
if(allied.active){startAlliedWave();return;}
if(clash.active&&clash.phase==='defend'&&clash._clashWaves){
G.phase='wave';const waveDef=clash._clashWaves[G.wave]||clash._clashWaves[0];
G.spawnQueue=[];let delay=0;const np=currentPaths.length;
for(const grp of waveDef.e){for(let i=0;i<grp.c;i++){const pi=np>1?i%np:0;G.spawnQueue.push({type:grp.t,time:delay,pathIdx:pi});delay+=grp.d;}}
G.spawnTimer=0;G.waveKills=0;G.waveNex=0;playSound('wave_start');return;}
if(G.wave>=TOTAL_WAVES&&!G.endlessMode)return;G.phase='wave';
let waveDef;
if(G.endlessMode){const budget=100*Math.pow(1.08,G.endlessWave);waveDef=generateEndlessWave(budget);}
else{waveDef=WAVES[G.wave];}
G.spawnQueue=[];let delay=0;const np=currentPaths.length;
for(const grp of waveDef.e){for(let i=0;i<grp.c;i++){const pi=np>1?i%np:0;G.spawnQueue.push({type:grp.t,time:delay,pathIdx:pi});delay+=grp.d;}}
G.spawnTimer=0;G.waveKills=0;G.waveNex=0;VFX.waveFlash=1;playSound('wave_start');}
function updateWaveSpawning(dt){if(G.spawnQueue.length===0)return;G.spawnTimer+=dt;while(G.spawnQueue.length>0&&G.spawnQueue[0].time<=G.spawnTimer){const s=G.spawnQueue.shift();spawnEnemy(s.type,s.pathIdx);}}
function isWaveComplete(){return G.spawnQueue.length===0&&G.enemies.filter(e=>e.alive).length===0;}

// Endless wave generation
function generateEndlessWave(budget){const types=['skitterling','venomspine','ironshell','stingwing','devastator','blisterbomb','hivemind','plaguebearer','tunneler','swarmcarrier','phasewraith','siegecrawler'];
const costs={skitterling:5,venomspine:15,ironshell:25,stingwing:15,devastator:80,blisterbomb:8,hivemind:50,plaguebearer:40,tunneler:20,swarmcarrier:30,phasewraith:20,siegecrawler:40};
const e=[];let rem=budget;while(rem>5){const t=types[Math.floor(Math.random()*types.length)];const c=costs[t]||10;if(c>rem){e.push({t:'skitterling',c:Math.floor(rem/5),d:0.3});break;}const count=Math.min(Math.floor(rem/c),Math.floor(Math.random()*10)+1);e.push({t:t,c:count,d:0.3+Math.random()*0.5});rem-=count*c;}
return{e};}

// Endless procedural map
function generateEndlessMap(biome){const cols=12,rows=18;const grid=Array.from({length:rows},()=>Array(cols).fill(0));
let x=Math.floor(Math.random()*cols),y=0;const path=[[x,y]];grid[y][x]=1;
while(y<rows-1){const dirs=[];if(x>0&&!grid[y][x-1])dirs.push([-1,0]);if(x<cols-1&&!grid[y][x+1])dirs.push([1,0]);dirs.push([0,1]);
const[dx,dy]=dirs[Math.floor(Math.random()*dirs.length)];x+=dx;y+=dy;x=Math.max(0,Math.min(cols-1,x));y=Math.min(rows-1,y);
if(!grid[y][x]){grid[y][x]=1;path.push([x,y]);}}
while(path.length<20){const last=path[path.length-1];const[lx,ly]=last;const opts=[];if(lx>0&&!grid[ly][lx-1])opts.push([lx-1,ly]);if(lx<cols-1&&!grid[ly][lx+1])opts.push([lx+1,ly]);if(ly<rows-1&&!grid[ly+1]?.[lx])opts.push([lx,ly+1]);if(opts.length===0)break;const[nx,ny]=opts[Math.floor(Math.random()*opts.length)];grid[ny][nx]=1;path.push([nx,ny]);}
return{paths:[path],cols,rows,baseCell:path[path.length-1]};}

// Global abilities
function useVanguardStrike(px,py){if(G.orbitalCD>0)return;G.orbitalCD=60;const r=cellSize*3;for(const e of G.enemies){if(!e.alive)continue;const dx=e.px-px,dy=e.py-py;if(Math.sqrt(dx*dx+dy*dy)<r){e.hp-=200;if(e.hp<=0&&e.alive)killEnemy(e);}}emitP(px,py,40,'#ff8800',250,0.8,6);emitP(px,py,20,'#ffcc00',200,0.6,4);if(settings.screenShake){G.shakeTimer=0.5;G.shakeIntensity=8;}G.orbitalTargeting=false;playSound('orbital');}
function useTemporalSurge(){if(G.chronoCD>0)return;G.chronoCD=90;G.chronoActive=10;playSound('ability');}
function useFieldRepair(){if(G.repairCD>0)return;G.repairCD=120;G.lives=Math.min(G.maxLives,G.lives+5);playSound('ability');}

// Stars
let _stars=null;
function getStars(){if(_stars)return _stars;_stars=[];for(let i=0;i<60;i++)_stars.push({x:((42*(i+1)*7919)%1000)/1000,y:((42*(i+1)*6151)%1000)/1000,b:0.15+((i*31)%40)/100,s:0.4+(i%3)*0.3,sp:0.5+i*0.03});return _stars;}
const menuParticles=[];for(let i=0;i<40;i++)menuParticles.push({x:Math.random()*500,y:Math.random()*900,s:Math.random()*1.5+0.5,v:Math.random()*0.3+0.1});
function drawStarfield(){
// Deep space gradient background
const bgGrad=ctx.createLinearGradient(0,0,0,H);
bgGrad.addColorStop(0,'#050810');bgGrad.addColorStop(0.25,'#080d1a');bgGrad.addColorStop(0.5,'#0a1020');bgGrad.addColorStop(0.75,'#0c1224');bgGrad.addColorStop(1,'#070b16');
ctx.fillStyle=bgGrad;ctx.fillRect(0,0,W,H);
// Twinkling stars with depth layers
const stars2=getStars(),time=performance.now()*0.001;
for(const s of stars2){
const tw=0.3+0.5*Math.sin(time*s.sp+s.x*10);
const hue=200+(s.x*40)%40;
// Star glow halo
const ga=s.b*tw*0.15;
if(s.s>0.8){ctx.fillStyle='hsla('+hue+',60%,80%,'+ga+')';ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.s*3,0,Math.PI*2);ctx.fill();}
ctx.fillStyle='hsla('+hue+',50%,75%,'+(s.b*tw)+')';
ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.s,0,Math.PI*2);ctx.fill();}
// Nebula clouds with more color variety
ctx.globalAlpha=0.02;
ctx.fillStyle='#003366';ctx.beginPath();ctx.arc(W*0.7,H*0.25,W*0.3,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#220033';ctx.beginPath();ctx.arc(W*0.25,H*0.7,W*0.25,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#002244';ctx.beginPath();ctx.arc(W*0.5,H*0.5,W*0.2,0,Math.PI*2);ctx.fill();
ctx.globalAlpha=1;
// Subtle scanline overlay
ctx.globalAlpha=0.015;ctx.fillStyle='#000';
for(let sy=0;sy<H;sy+=3){ctx.fillRect(0,sy,W,1);}
ctx.globalAlpha=1;}

// Drawing
function drawMap(){drawStarfield();const biome=getBiome();const biomeType=MAPS[G.mapIdx].biome;
for(let r=0;r<currentRows;r++)for(let c=0;c<currentCols;c++){const x=offsetX+c*cellSize,y=offsetY+r*cellSize;
const isPath=isPathCell(c,r);
ctx.fillStyle=isPath?biome.path:biome.ground;ctx.fillRect(x,y,cellSize,cellSize);
// Biome-specific ground detail
if(!isPath){ctx.globalAlpha=0.04;ctx.strokeStyle=biome.accent;ctx.lineWidth=0.5;
if(biomeType==='urban'){// Circuit traces

function updateOffenseGame(dt){
const sdt=dt*G.gameSpeed;
// Spawn cooldown
if(offense.spawnCooldown>0)offense.spawnCooldown-=dt;
// Update enemies (they walk the path)
for(let i=G.enemies.length-1;i>=0;i--){
const e=G.enemies[i];if(!e.alive)continue;
// Move along path
const pathLen=getPathLen(e.pathIdx);const spd=(e.speed*(e.slowTimer>0?0.5:1))*cellSize;
e.pathProgress+=spd*sdt/pathLen;
if(e.pathProgress>=1){
offense.unitsPast++;e.alive=false;
emitP(e.px,e.py,8,'#44ff88',80,0.5,3);continue;}
const pos=getPosOnPath(e.pathProgress,e.pathIdx);e.px=pos.x;e.py=pos.y;
if(e.slowTimer>0)e.slowTimer-=sdt;
if(e.shieldTimer>0)e.shieldTimer-=sdt;}
// Check win
if(offense.unitsPast>=offense.goalUnits){G.phase='offenseResult';return;}
// Check lose - no bio-mass and no alive enemies
const aliveCount=G.enemies.filter(e2=>e2.alive).length;
if(offense.bioMass<=0&&aliveCount===0&&G.spawnQueue.length===0){G.phase='offenseResult';return;}
// AI towers attack
updateTowers(sdt);if(loadoutBonuses.frostField){for(const e2 of G.enemies)if(e2.alive&&!e2.slowTimer)e2.slowTimer=Math.max(e2.slowTimer||0,0.5);}updateProjectiles(sdt);updateParticles(sdt);updateDmgNums(sdt);updateChains(sdt);}

function doSwarmTurn(){
campaign.swarmThreat+=0.5;
const swarmTerritories=getCampaignSwarmTerritories();
const playerTerritories=getCampaignPlayerTerritories().filter(t=>t.canLose);
// Swarm builds on random territory
if(swarmTerritories.length>0&&Math.random()<0.3){
const st=swarmTerritories[Math.floor(Math.random()*swarmTerritories.length)];
if((st.buildings||[]).length<3){const types=['outpost','garrison','lab'];st.buildings.push(types[Math.floor(Math.random()*types.length)]);if(st.buildings[st.buildings.length-1]==='garrison')st.garrison=Math.min(3,st.garrison+1);}}
// Swarm expands to neutral territories
const neutralAdj=campaign.territories.filter(t=>t.owner==='neutral'&&isTerritoryAdjacentToSwarm(t.id));
if(neutralAdj.length>0){const pick=neutralAdj[Math.floor(Math.random()*neutralAdj.length)];pick.owner='swarm';}
// Swarm attacks player?
const attackable=playerTerritories.filter(t=>isTerritoryAdjacentToSwarm(t.id));
const attackChance=Math.min(0.8,0.3+campaign.swarmThreat*0.05);
if(attackable.length>0&&Math.random()<attackChance){
campaign.swarmAttackTarget=attackable[Math.floor(Math.random()*attackable.length)].id;
G.phase='campaignSwarmAttack';}
else{campaign.swarmAttackTarget=-1;G.phase='campaignSwarmAttack';}}

function gameLoop(ts){requestAnimationFrame(gameLoop);const dt=Math.min((ts-lastTime)/1000,0.1);lastTime=ts;animTime+=dt;Music.update(dt);update(dt);render();
_frames++;const now=performance.now();if(now-_lastFps>=1000){_fps=Math.round((_frames*1000)/(now-_lastFps));_frames=0;_lastFps=now;checkFpsThrottle();
if(settings.showFPS){debugEl.style.display='block';debugEl.textContent='FPS: '+_fps;}else debugEl.style.display='none';}}

// Input
function getGridCell(px,py){const c=Math.floor((px-offsetX)/cellSize),r=Math.floor((py-offsetY)/cellSize);if(c<0||c>=currentCols||r<0||r>=currentRows)return null;return{col:c,row:r};}
function hitTest(px,py,r){return r&&px>=r.x&&px<=r.x+r.w&&py>=r.y&&py<=r.y+r.h;}
function hitCircle(px,py,c){const dx=px-c.x,dy=py-c.y;return Math.sqrt(dx*dx+dy*dy)<=c.r;}

function handleTap(px,py){initAudio();

if(G.phase==='campaignMap'){handleCampaignMapTap(px,py);return;}
if(G.phase==='campaignSwarmAttack'){handleCampaignSwarmAttackTap(px,py);return;}
if(G.phase==='campaignVictory'){if(G._btns.campaignVictoryMenu&&hitTest(px,py,G._btns.campaignVictoryMenu)){G.phase='menu';campaign.active=false;saveAllState();playSound('click');}return;}
if(G.phase==='campaignDefeat'){if(G._btns.campaignDefeatMenu&&hitTest(px,py,G._btns.campaignDefeatMenu)){G.phase='menu';campaign.active=false;saveAllState();playSound('click');}return;}
if(G.phase==='offenseMapSelect'){
if(G._btns.offenseMaps)for(const om2 of G._btns.offenseMaps){if(hitTest(px,py,om2)){startOffenseGame(om2.idx);playSound('click');return;}}
if(G._btns.offenseBack&&hitTest(px,py,G._btns.offenseBack)){G.phase='menu';playSound('click');}return;}
if(G.phase==='offenseGame'){
// Handle spawn panel taps
if(G._btns.offenseSpawn)for(const os of G._btns.offenseSpawn){if(hitTest(px,py,os)){
const oe=OFFENSE_ENEMIES[os.idx];
if(offense.bioMass>=oe.cost&&offense.spawnCooldown<=0){offense.bioMass-=oe.cost;offense.spawnCooldown=0.2;spawnOffenseEnemy(oe.id);playSound('place');tryVibrate(10);}
else playSound('error');return;}}return;}
if(G.phase==='offenseResult'){
if(G._btns.offenseRetry&&hitTest(px,py,G._btns.offenseRetry)){startOffenseGame(offense.mapIdx);playSound('click');return;}
if(G._btns.offenseToMenu&&hitTest(px,py,G._btns.offenseToMenu)){G.phase='menu';offense.active=false;playSound('click');}return;}
if(G.phase==='loadout'){
if(G._btns.loadoutBack&&hitTest(px,py,G._btns.loadoutBack)){calculateLoadoutBonuses();G.phase='menu';playSound('click');return;}
if(G._btns.loadoutCards)for(const lc of G._btns.loadoutCards){if(hitTest(px,py,lc)){
const card=ARSENAL_CARDS[lc.idx];
if(loadout.unlockedCards.has(card.id)){
if(loadout.equippedCards.has(card.id)){loadout.equippedCards.delete(card.id);saveAllState();playSound('click');}
else if(loadout.equippedCards.size<3){loadout.equippedCards.add(card.id);saveAllState();playSound('place');}
else playSound('error');}return;}}
if(G._btns.loadoutSkins)for(const ls2 of G._btns.loadoutSkins){if(hitTest(px,py,ls2)){
const t2=TT[ls2.idx];const skins=loadout.unlockedSkins[t2.id];
const curIdx=skins.indexOf(loadout.equippedSkins[t2.id]);
loadout.equippedSkins[t2.id]=skins[(curIdx+1)%skins.length];saveAllState();playSound('click');return;}}return;}
if(G.phase==='profile'){if(G._btns.profileAchievements&&hitTest(px,py,G._btns.profileAchievements)){G.phase='achievements';playSound('click');return;}if(G._btns.profileBack&&hitTest(px,py,G._btns.profileBack)){G.phase='menu';playSound('click');}return;}

if(G.phase==='achievements'){if(G._btns.achievementsBack&&hitTest(px,py,G._btns.achievementsBack)){G.phase='profile';playSound('click');}return;}
if(G.phase==='alliedVictory'){if(G._btns.alliedMenu&&hitTest(px,py,G._btns.alliedMenu)){G.phase='menu';allied.active=false;stopAmbient();playSound('click');}return;}
if(G.phase==='clashFinal'){if(G._btns.clashMenu&&hitTest(px,py,G._btns.clashMenu)){G.phase='menu';clash.active=false;stopAmbient();playSound('click');}return;}
if(G.phase==='clashAttack'){
if(G._btns.clashAttackSpawn)for(const os of G._btns.clashAttackSpawn){if(hitTest(px,py,os)){
const oe=OFFENSE_ENEMIES[os.idx];
if(offense.bioMass>=oe.cost&&offense.spawnCooldown<=0){offense.bioMass-=oe.cost;offense.spawnCooldown=0.2;spawnOffenseEnemy(oe.id);playSound('place');tryVibrate(10);}
else playSound('error');return;}}return;}
if(G.phase==='clashAttackResult'){if(G._btns.clashContinue&&hitTest(px,py,G._btns.clashContinue)){
handleClashResult();playSound('click');}return;}
if(G.phase==='menu'){if(hitTest(px,py,G._btns.menuPlay)){G.phase='mapSelect';playSound('click');}
else if(hitTest(px,py,G._btns.menuEndless)){G.phase='biomeSelect';playSound('click');}
else if(hitTest(px,py,G._btns.menuCampaign)){initCampaign();G.phase='campaignMap';playSound('click');}
else if(hitTest(px,py,G._btns.menuOffense)){G.phase='offenseMapSelect';playSound('click');}
else if(G._btns.menuAllied&&hitTest(px,py,G._btns.menuAllied)){startAlliedDefense();playSound('click');}
else if(G._btns.menuClash&&hitTest(px,py,G._btns.menuClash)){startSectorClash();playSound('click');}
else if(hitTest(px,py,G._btns.menuLoadout)){G.phase='loadout';playSound('click');}
else if(hitTest(px,py,G._btns.menuProfile)){G.phase='profile';playSound('click');}
else if(hitTest(px,py,G._btns.menuSettings)){G.previousPhase='menu';G.phase='settings';playSound('click');}
else if(hitTest(px,py,G._btns.menuHowTo)){G.phase='howToPlay';playSound('click');}return;}
if(G.phase==='howToPlay'){if(hitTest(px,py,G._btns.howToBack)){G.phase='menu';playSound('click');}return;}
if(G.phase==='settings'){
if(hitTest(px,py,G._btns.settingsBack)){G.phase=G.previousPhase||'menu';playSound('click');return;}
if(G._btns.settingsOpts)for(const opt of G._btns.settingsOpts){if(hitTest(px,py,opt)){const i=opt.idx;
if(i===0){settings.sfxVol=(settings.sfxVol+25)%125;}
else if(i===1){settings.musicVol=(settings.musicVol+25)%125;Music.updateVolume();}
else if(i===2){settings.defaultSpeed=settings.defaultSpeed%3+1;}
else if(i===3){settings.damageNumbers=!settings.damageNumbers;}
else if(i===4){settings.gridOverlay=!settings.gridOverlay;}
else if(i===5){settings.screenShake=!settings.screenShake;}
else if(i===6){settings.showFPS=!settings.showFPS;}
saveAllState();playSound('click');return;}}return;}
if(G.phase==='biomeSelect'){if(G._btns.biomes)for(const b of G._btns.biomes){if(hitTest(px,py,b)){G.endlessBiome=b.biome;startEndlessGame();playSound('click');return;}}
if(hitTest(px,py,G._btns.biomeBack)){G.phase='menu';playSound('click');}return;}
if(G.phase==='mapSelect'){if(G._btns.biomeTabs)for(const bt of G._btns.biomeTabs){if(hitTest(px,py,bt)){G.biomeTab=bt.tab;playSound('click');return;}}
if(G._btns.maps)for(let i=0;i<G._btns.maps.length;i++){if(hitTest(px,py,G._btns.maps[i])){G.mapIdx=G._btns.maps[i].origIdx;G.phase='diffSelect';playSound('click');return;}}
if(hitTest(px,py,G._btns.mapBack)){G.phase='menu';playSound('click');}return;}
if(G.phase==='diffSelect'){if(G._btns.diffs)for(let i=0;i<G._btns.diffs.length;i++){if(hitTest(px,py,G._btns.diffs[i])){G.diffIdx=G._btns.diffs[i].idx;startGame();playSound('click');return;}}
if(hitTest(px,py,G._btns.diffBack)){G.phase='mapSelect';playSound('click');}return;}
if(G.phase==='gameover'||G.phase==='victory'){
if(hitTest(px,py,G._btns.restart)){
if(campaign.active){processCampaignAfterBattle(false);playSound('click');}
else{startGame();playSound('click');}return;}
if(hitTest(px,py,G._btns.toMenu)){
if(campaign.active){processCampaignAfterBattle(G.phase==='victory');saveAllState();playSound('click');}
else{G.phase='menu';saveAllState();playSound('click');}return;}
if(G._btns.campaignReturn&&hitTest(px,py,G._btns.campaignReturn)){processCampaignAfterBattle(G.phase==='victory');playSound('click');return;}
return;}
if(G.phase==='wavePreview'){startWave();return;}
if(G.phase==='waveSummary'){G.phase='build';playSound('click');return;}
if(G.phase==='paused'){if(hitTest(px,py,G._btns.resume)){G.phase=G.previousPhase;playSound('click');}
else if(hitTest(px,py,G._btns.pauseSettings)){G.phase='settings';playSound('click');}
else if(hitTest(px,py,G._btns.quit)){G.phase='menu';saveAllState();playSound('click');}return;}
if(G.orbitalTargeting){const cell=getGridCell(px,py);if(cell)useVanguardStrike(px,py);else G.orbitalTargeting=false;return;}
if(hitTest(px,py,G._btns.speed)){G.gameSpeed=G.gameSpeed===1?2:G.gameSpeed===2?3:1;playSound('click');return;}
if(hitTest(px,py,G._btns.pause)){if(G.phase==='build'||G.phase==='wave'){G.previousPhase=G.phase;G.phase='paused';G.showRadialMenu=false;G.showTowerInfo=false;G.towerInfoIdx=-1;G.orbitalTargeting=false;playSound('click');}return;}
if(G.showRadialMenu){let tapped=false;if(G._btns.radial)for(const btn of G._btns.radial){if(hitCircle(px,py,btn)){const cost=getTowerCost(btn.idx);if(G.nexium>=cost&&!isTowerRestricted(btn.idx)){placeTower(G.radialMenuCol,G.radialMenuRow,btn.idx);}else playSound('error');tapped=true;break;}}G.showRadialMenu=false;G._btns.radial=null;G.hoveredRadialIdx=-1;if(tapped)return;playSound('click');return;}
if(G._btns.globals)for(let i=0;i<G._btns.globals.length;i++){if(hitTest(px,py,G._btns.globals[i])){if(i===0){if(G.orbitalCD<=0){G.orbitalTargeting=true;playSound('click');}else playSound('error');}
else if(i===1)useTemporalSurge();else if(i===2)useFieldRepair();return;}}
if(G.showTowerInfo){if(hitTest(px,py,G._btns.closeInfo)){G.showTowerInfo=false;G.towerInfoIdx=-1;playSound('click');return;}
if(G._btns.upgrade&&hitTest(px,py,G._btns.upgrade)){if(!upgradeTower(G.towerInfoIdx))playSound('error');return;}
if(G._btns.ability&&hitTest(px,py,G._btns.ability)){if(!activateAbility(G.towerInfoIdx))playSound('error');return;}
if(hitTest(px,py,G._btns.sell)){sellTower(G.towerInfoIdx);G.showTowerInfo=false;G.towerInfoIdx=-1;return;}}
if(G.phase==='build'&&G._btns.startWave&&hitTest(px,py,G._btns.startWave)){G.phase='wavePreview';return;}
const cell=getGridCell(px,py);if(!cell){G.showTowerInfo=false;G.towerInfoIdx=-1;return;}
for(let i=0;i<G.towers.length;i++){if(G.towers[i].col===cell.col&&G.towers[i].row===cell.row){G.showTowerInfo=true;G.towerInfoIdx=i;playSound('click');return;}}
if(isValidPlacement(cell.col,cell.row)){let occ=false;for(const t of G.towers)if(t.col===cell.col&&t.row===cell.row){occ=true;break;}
if(!occ&&(G.phase==='build'||G.phase==='wave')){G.showRadialMenu=true;G.radialMenuCol=cell.col;G.radialMenuRow=cell.row;playSound('click');return;}}
G.showTowerInfo=false;G.towerInfoIdx=-1;}

canvas.addEventListener('touchstart',e=>{e.preventDefault();const tx=e.touches[0].clientX,ty=e.touches[0].clientY;lastTouchFlash={x:tx,y:ty,timer:0.2};pressedBtn=findPressedButton(tx,ty);pressedBtnTimer=0.15;handleTap(tx,ty);},{passive:false});
canvas.addEventListener('click',e=>handleTap(e.clientX,e.clientY));
canvas.addEventListener('mousemove',e=>{if(G.showRadialMenu&&G._btns.radial){G.hoveredRadialIdx=-1;for(const btn of G._btns.radial)if(hitCircle(e.clientX,e.clientY,btn)){G.hoveredRadialIdx=btn.idx;break;}}});

// Start game
function startGame(){calculateLoadoutBonuses();setupMap(G.mapIdx);const d=DIFFS[G.diffIdx];G.nexium=d.nex+loadoutBonuses.extraNexium;G.maxLives=d.lives+loadoutBonuses.extraLives;G.lives=d.lives+loadoutBonuses.extraLives;G.wave=0;G.score=0;G.towers=[];G.enemies=[];G.spawnQueue=[];G.spawnTimer=0;G.showRadialMenu=false;G.showTowerInfo=false;G.towerInfoIdx=-1;G.hoveredRadialIdx=-1;G.totalKills=0;G.totalNexEarned=0;G.totalNexSpent=0;G.towersPlaced=0;G.enemiesAlive=0;G.gameSpeed=settings.defaultSpeed;G.orbitalCD=0;G.chronoCD=0;G.repairCD=0;G.chronoActive=0;G.orbitalTargeting=false;G.waveKills=0;G.waveNex=0;G.shakeTimer=0;G.placementAnims=[];G._btns={};G.endlessMode=false;nextEnemyId=0;particlePool.pool.forEach(p=>p.active=false);projectilePool.pool.forEach(p=>p.active=false);dmgNumPool.pool.forEach(d=>d.active=false);chainPool.pool.forEach(c=>c.active=false);G.phase='build';playSound('transition');startAmbient(MAPS[G.mapIdx].biome);}

function startEndlessGame(){G.endlessMode=true;G.endlessBiome=G.endlessBiome||'urban';G.endlessWave=0;G.diffIdx=0;
const eMap=generateEndlessMap(G.endlessBiome);currentCols=eMap.cols;currentRows=eMap.rows;currentPaths=eMap.paths;pathSets=[];for(const p of currentPaths){const s=new Set();p.forEach(([c,r])=>s.add(c+','+r));pathSets.push(s);}recalcLayout();
const d=DIFFS[0];G.nexium=d.nex;G.maxLives=d.lives;G.lives=d.lives;G.wave=0;G.score=0;G.towers=[];G.enemies=[];G.spawnQueue=[];G.spawnTimer=0;G.showRadialMenu=false;G.showTowerInfo=false;G.towerInfoIdx=-1;G.hoveredRadialIdx=-1;G.totalKills=0;G.totalNexEarned=0;G.totalNexSpent=0;G.towersPlaced=0;G.enemiesAlive=0;G.gameSpeed=settings.defaultSpeed;G.orbitalCD=0;G.chronoCD=0;G.repairCD=0;G.chronoActive=0;G.orbitalTargeting=false;G.waveKills=0;G.waveNex=0;G.shakeTimer=0;G.placementAnims=[];G._btns={};nextEnemyId=0;particlePool.pool.forEach(p=>p.active=false);projectilePool.pool.forEach(p=>p.active=false);dmgNumPool.pool.forEach(d=>d.active=false);chainPool.pool.forEach(c=>c.active=false);
// Fake map idx for biome rendering
G.mapIdx=MAPS.findIndex(m=>m.biome===G.endlessBiome)||0;
G.phase='build';playSound('transition');startAmbient(G.endlessBiome);}

// Testing hooks
window.render_game_to_text=function(){return JSON.stringify({phase:G.phase,wave:G.endlessMode?G.endlessWave:G.wave,nexium:G.nexium,lives:G.lives,score:G.score,mapIdx:G.mapIdx,diffIdx:G.diffIdx,towerCount:G.towers.length,towers:G.towers.map(t=>({col:t.col,row:t.row,type:TT[t.typeIdx].id,level:t.level})),enemyCount:G.enemies.filter(e=>e.alive).length,spawnQueueLength:G.spawnQueue.length,showRadialMenu:G.showRadialMenu,showTowerInfo:G.showTowerInfo,gameSpeed:G.gameSpeed,totalKills:G.totalKills,endless:G.endlessMode,fps:_fps,storageAvailable:storageAvailable,level:prog.level,totalMatches:prog.totalMatches,achievementsCount:achievements.unlocked.size,clashElo:clash.elo});};
window.advanceTime=function(ms){const steps=Math.max(1,Math.round(ms/(1000/60)));for(let i=0;i<steps;i++)update(1/60);render();};
window._setGamePhase=function(phase){G.phase=phase;render();};


loadAllState();
document.fonts.ready.then(()=>requestAnimationFrame(gameLoop));

})();
</script>
</body>
